<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>帳號登入中 — Save to Notion</title>
    <link rel="stylesheet" href="styles/callback-bridge.css" />
    <style>
      /* ============================================
         auth.html — Account Callback Bridge Page
         用途：接收 Worker 302 重定向，完成 session
         exchange，然後自動關閉。
         不含複雜樣式，只需最小可用的狀態呈現。
         ============================================ */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: #1e293b;
        border-radius: 12px;
        padding: 40px 48px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }

      .logo {
        width: 48px;
        height: 48px;
        margin: 0 auto 20px;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 8px;
        color: #f8fafc;
      }

      .subtitle {
        font-size: 0.875rem;
        color: #94a3b8;
        margin-bottom: 28px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img
        src="icons/icon48.png"
        alt="Save to Notion"
        class="logo"
      />
      <h1>帳號登入</h1>
      <p class="subtitle">Save to Notion — Google 帳號驗證</p>

      <!-- 狀態區域：由 auth.js 動態管理 -->
      <output id="status-area" class="status-area" aria-live="polite" aria-atomic="true">
        <div class="spinner" id="spinner" aria-hidden="true"></div>
        <p class="status-text" id="status-text">正在驗證登入資訊...</p>
      </output>

      <p class="close-hint" id="close-hint" style="display: none">此頁面將自動關閉</p>
    </div>

    <!-- auth.js 處理所有 callback bridge 邏輯 -->
    <script src="scripts/auth/auth.js" type="module"></script>
  </body>
</html>
<!-- trigger release please -->
