<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notion Smart Clipper - 更新說明</title>
    <link rel="stylesheet" href="update-notification.css" />
  </head>

  <body>
    <div class="container">
      <header class="header">
        <div class="logo">
          <img src="../icons/icon48.png" alt="Notion Smart Clipper" class="logo-icon" />
          <div class="logo-text">
            <h1>Notion Smart Clipper</h1>
            <div class="version-info">
              <span class="version-badge" id="current-version"></span>
              <span class="update-label">已更新</span>
            </div>
          </div>
        </div>
        <button class="close-btn" id="close-btn" title="關閉">✕</button>
      </header>

      <main class="content">
        <div class="update-hero">
          <div class="update-icon">🎉</div>
          <h2>更新完成！</h2>
          <p class="update-summary">
            從 <span id="prev-version"></span> 更新到 <span id="curr-version"></span>
          </p>
        </div>

        <div class="update-body">
          <p>本次更新包含功能改進與問題修復，感謝你的持續支持。</p>
          <p>請查看完整更新日誌以了解所有改動詳情。</p>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="view-changelog-btn" type="button">
            📋 查看完整更新日誌
          </button>
          <button class="btn btn-secondary" id="close-action-btn" type="button">✕ 關閉</button>
        </div>
      </main>
    </div>

    <script src="update-notification.js"></script>
  </body>
</html>
