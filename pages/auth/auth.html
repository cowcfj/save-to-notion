<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>帳號登入中 — Save to Notion</title>
    <link rel="stylesheet" href="../../styles/callback-bridge.css" />
  </head>
  <body>
    <div class="card">
      <img src="../../icons/icon48.png" alt="Save to Notion" class="logo" />
      <h1>帳號登入</h1>
      <p class="subtitle">Save to Notion — Google 帳號驗證</p>

      <!-- 狀態區域：由 auth.js 動態管理 -->
      <output id="status-area" class="status-area" aria-live="polite" aria-atomic="true">
        <div class="spinner" id="spinner" aria-hidden="true"></div>
        <p class="status-text" id="status-text">正在驗證登入資訊...</p>
      </output>

      <p class="close-hint hidden" id="close-hint">此頁面將自動關閉</p>
    </div>

    <!-- auth.js 處理所有 callback bridge 邏輯 -->
    <script src="../../dist/pages/auth.js" type="module"></script>
  </body>
</html>
