sonar.projectKey=cowcfj_save-to-notion
sonar.organization=cowcfj
sonar.host.url=https://sonarcloud.io

# 原始碼路徑
sonar.sources=scripts,pages
# 語言特定設定
sonar.javascript.file.suffixes=.js

# 排除不需要分析的路徑
sonar.exclusions=node_modules/**,dist/**,coverage/**,tests/**,**/*.test.js,**/*.spec.js,playwright-report/**,lib/Readability.js

# 覆蓋率排除清單（對齊 jest.config.js 的 collectCoverageFrom）
# 兩類排除：(1) 純常量 config；(2) prod DCE 後 unreachable 的 Toolbar 鏈（見 jest.config.js 同段註釋）。
# 這些檔案的覆蓋率不代表 production 行為，但仍接受 SonarCloud 的 issue / code smell 分析。
sonar.coverage.exclusions=scripts/config/app.js,scripts/config/icons.js,scripts/config/ui.js,scripts/config/extraction.js,scripts/config/highlightConstants.js,scripts/config/index.js,scripts/config/extension/**/*.js,scripts/highlighter/ui/Toolbar.js,scripts/highlighter/ui/ToolbarRuntime.js,scripts/highlighter/ui/ToolbarState.js,scripts/highlighter/ui/ToolbarUI.js,scripts/highlighter/ui/styles/toolbarStyles.js,scripts/highlighter/ui/components/ColorPicker.js,scripts/highlighter/ui/components/MiniIcon.js,scripts/highlighter/ui/components/ToolbarContainer.js,**/*.test.js,**/*.spec.js,tests/**,node_modules/**,dist/**,coverage/**,playwright-report/**,lib/Readability.js

# 測試覆蓋率報告路徑（jest unit only；E2E coverage 不合併進 quality gate，避免 ghost-line 污染）
sonar.javascript.lcov.reportPaths=coverage/jest/lcov.info

# 測試代碼路徑（僅標註，不計入技術債）
sonar.tests=tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# 編碼
sonar.sourceEncoding=UTF-8

# Issue ignore：extension UI 採用 data-ui-message + applyStaticOptionMessages runtime 綁定
# 模式（與 Chrome 官方 chrome.i18n.getMessage __MSG_xxx__ pattern 等價），靜態 HTML 必為
# 空 heading／label，會誤觸 Web:S6850（empty heading）與 Web:S6853（label without text）。
# 此模式為 repo-wide 慣例，runtime 由 options.js:applyStaticOptionMessages 注入文字，
# 並由 tests/unit/options/options.test.js 的 data-ui-message 合約測試保護 key 解析正確性。
# 若未來引入 build-time inline 或無 JS fallback，請移除此 ignore 並重新評估。
# 詳見 docs/specs/CONFIGURATION_ARCHITECTURE.md「UI 字串綁定機制」。
sonar.issue.ignore.multicriteria=extUiBindingHeading,extUiBindingLabel,extUiBindingAnchor
sonar.issue.ignore.multicriteria.extUiBindingHeading.ruleKey=Web:S6850
sonar.issue.ignore.multicriteria.extUiBindingHeading.resourceKey=**/options.html,**/popup.html,**/sidepanel.html
sonar.issue.ignore.multicriteria.extUiBindingLabel.ruleKey=Web:S6853
sonar.issue.ignore.multicriteria.extUiBindingLabel.resourceKey=**/options.html,**/popup.html,**/sidepanel.html
sonar.issue.ignore.multicriteria.extUiBindingAnchor.ruleKey=Web:S6827
sonar.issue.ignore.multicriteria.extUiBindingAnchor.resourceKey=**/options.html,**/popup.html,**/sidepanel.html
