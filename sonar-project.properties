sonar.projectKey=cowcfj_save-to-notion
sonar.organization=cowcfj
sonar.host.url=https://sonarcloud.io

# 原始碼路徑
sonar.sources=scripts,options,popup,sidepanel
# 語言特定設定
sonar.javascript.file.suffixes=.js

# 排除不需要分析的路徑
sonar.exclusions=node_modules/**,dist/**,coverage/**,tests/**,**/*.test.js,**/*.spec.js,playwright-report/**,lib/Readability.js

# 覆蓋率排除清單（對齊 Jest collectCoverageFrom）
sonar.coverage.exclusions=scripts/config/app.js,scripts/config/icons.js,scripts/config/ui.js,scripts/config/extraction.js,scripts/config/highlightConstants.js,scripts/config/index.js,scripts/config/extension/**/*.js,**/*.test.js,**/*.spec.js,tests/**,node_modules/**,dist/**,coverage/**,playwright-report/**,lib/Readability.js

# 測試覆蓋率報告路徑 (支援 merged 完整報告或單獨 jest 報告)
sonar.javascript.lcov.reportPaths=coverage/merged/lcov.info,coverage/jest/lcov.info

# 測試代碼路徑（僅標註，不計入技術債）
sonar.tests=tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# 編碼
sonar.sourceEncoding=UTF-8

# Issue ignore：extension UI 採用 data-ui-message + applyStaticOptionMessages runtime 綁定
# 模式（與 Chrome 官方 chrome.i18n.getMessage __MSG_xxx__ pattern 等價），靜態 HTML 必為
# 空 heading／label，會誤觸 Web:S6850（empty heading）與 Web:S6853（label without text）。
# 此模式為 repo-wide 慣例，runtime 由 options.js:applyStaticOptionMessages 注入文字，
# 並由 tests/unit/options/options.test.js 的 data-ui-message 合約測試保護 key 解析正確性。
# 若未來引入 build-time inline 或無 JS fallback，請移除此 ignore 並重新評估。
# 詳見 docs/specs/CONFIGURATION_ARCHITECTURE.md「UI 字串綁定機制」。
sonar.issue.ignore.multicriteria=extUiBindingHeading,extUiBindingLabel
sonar.issue.ignore.multicriteria.extUiBindingHeading.ruleKey=Web:S6850
sonar.issue.ignore.multicriteria.extUiBindingHeading.resourceKey=**/options.html,**/popup.html,**/sidepanel.html
sonar.issue.ignore.multicriteria.extUiBindingLabel.ruleKey=Web:S6853
sonar.issue.ignore.multicriteria.extUiBindingLabel.resourceKey=**/options.html,**/popup.html,**/sidepanel.html
