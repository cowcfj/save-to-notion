<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save to Notion - Annotations</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header Area -->
      <div class="sidebar-header">
        <h2 class="sidebar-title">
          <svg
            class="header-icon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
          標註
        </h2>
        <div class="header-actions">
          <button id="sync-button" class="icon-button" title="同步" aria-label="同步" disabled>
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.21l-5.65 1.14" />
            </svg>
          </button>
          <button
            id="open-notion-button"
            class="icon-button"
            title="開啟"
            aria-label="開啟"
            style="display: none"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            </svg>
          </button>
        </div>
      </div>

      <!-- View Tabs -->
      <div class="view-tabs" id="view-tabs">
        <button class="view-tab active" data-view="current">本頁標註</button>
        <button class="view-tab" data-view="unsynced">
          <span class="status-dot"></span>
          待同步
          <span id="unsynced-badge" class="badge"></span>
        </button>
      </div>

      <!-- Loading State -->
      <div id="loading-state" class="state-container">
        <div class="spinner"></div>
        <p>載入中...</p>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="state-container" style="display: none">
        <svg
          class="empty-icon"
          width="48"
          height="48"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
        <p>本頁尚無標註</p>
        <p class="subtitle">選取網頁文字即可標註</p>
      </div>

      <!-- Highlights List -->
      <div id="highlights-list" class="highlights-list" style="display: none">
        <!-- Dynamic content will be injected here -->
      </div>

      <!-- Unsynced Pages View -->
      <div id="unsynced-toolbar" style="display: none">
        <span id="unsynced-count-label" class="unsynced-count-label"></span>
        <button id="clear-all-btn" class="clear-all-btn" title="清除全部">
          <svg
            aria-hidden="true"
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="3 6 5 6 21 6"></polyline>
            <path
              d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
            ></path>
          </svg>
          清除全部
        </button>
      </div>
      <div id="unsynced-view" style="display: none">
        <!-- Dynamic page cards injected here -->
      </div>

      <!-- Load More Button -->
      <button id="load-more-btn" class="load-more-btn" style="display: none"> 載入更多 </button>

      <!-- Status Message Area -->
      <div id="status-message" class="status-message" style="display: none"></div>
    </div>

    <!-- Template for a single highlight card -->
    <template id="highlight-card-template">
      <div class="highlight-card">
        <div class="highlight-color-indicator"></div>
        <div class="highlight-content">
          <p class="highlight-text"></p>
        </div>
        <button class="delete-button" title="刪除">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="3 6 5 6 21 6"></polyline>
            <path
              d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
            ></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </button>
      </div>
    </template>

    <!-- Template for an unsynced page card -->
    <template id="page-card-template">
      <div class="page-card">
        <div class="page-card-header">
          <div class="page-title-row">
            <span class="status-dot"></span>
            <p class="page-title"></p>
          </div>
          <div class="page-info">
            <span class="page-meta"></span>
          </div>
          <button class="page-open-button" title="開啟網頁" aria-label="開啟網頁">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </button>
          <button class="page-delete-button" title="刪除本頁標註" aria-label="刪除本頁標註">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="3 6 5 6 21 6"></polyline>
              <path
                d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
              ></path>
            </svg>
          </button>
        </div>
        <div class="page-card-previews">
          <!-- Dynamic preview rows injected here -->
        </div>
        <span class="page-card-remaining"></span>
      </div>
    </template>

    <script src="sidepanel.js" type="module"></script>
  </body>
</html>
