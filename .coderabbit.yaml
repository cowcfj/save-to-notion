# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit Configuration
# Documentation: https://coderabbit.ai/docs/configure-coderabbit

language: 'zh'
inheritance: true

reviews:
  tools:
    biome:
      enabled: false
    eslint:
      enabled: false
  profile: 'assertive'
  request_changes_workflow: false
  high_level_summary: false
  changed_files_summary: false
  review_status: false
  suggested_reviewers: false
  poem: false

  auto_review:
    enabled: true
    ignore_usernames:
      - 'release-please[bot]'
      - 'github-actions[bot]'

  path_instructions:
    - path: '**/*'
      instructions: |
        # Project Specific Guidelines
        1. Language: All user-facing UI text, strings, and messages MUST be in Traditional Chinese (zh-TW).
        2. Architecture: Follow the defined storage structures and specs. Do not introduce unauthorized storage fields.
        3. Code Quality: Avoid N+1 issues, blocking operations, and ensure high code quality. Suggest optimizations that follow modern JavaScript/Chrome Extension best practices.

  finishing_touches:
    unit_tests:
      enabled: false

  path_filters:
    - '!CHANGELOG.md'
    - '!package-lock.json'
    - '!dist/**'
    - '!coverage/**'
    - '!icons/**'
    - '!promo-images/**'
    - '!releases/**'
    - '!demos/**'
    - '!docs/guides/*_MCP_GUIDE.md'
    - '!docs/guides/CONTEXT7_MCP_GUIDE.md'

code_generation:
  docstrings:
    language: 'zh'

issue_enrichment:
  auto_enrich:
    enabled: true

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - 'AGENTS.md'
      - '.agents/.shared/knowledge/**/*.json'
