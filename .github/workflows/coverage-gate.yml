name: Coverage Gate
run-name: Coverage Gate @ ${{ github.ref_name }} (${{ github.event_name }})

on:
  pull_request:
    branches: [main, develop]
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  coverage-classifier:
    name: Coverage Gate Classifier
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.decision.outputs.should-run }}
    steps:
      - name: 簽出 repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 偵測覆蓋率相關變更
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        with:
          filters: |
            coverage-relevant:
              - 'scripts/**'
              - 'pages/**'
              - 'tests/**'
              - 'babel.config.js'
              - 'jest.config.js'
              - 'jest.config.*.js'
              - 'jest.native-esm.config.cjs'
              - 'package.json'
              - 'package-lock.json'
              - 'sonar-project.properties'
              - 'codecov.yml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/coverage-gate.yml'

      - name: 判斷是否需要完整覆蓋率
        id: decision
        run: |
          SHOULD_RUN=false

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            SHOULD_RUN=true
          elif [ "${{ startsWith(github.head_ref, 'release-please--') }}" = "true" ]; then
            SHOULD_RUN=false
          elif [ "${{ steps.changes.outputs.coverage-relevant }}" = "true" ]; then
            SHOULD_RUN=true
          fi

          echo "should-run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "覆蓋率檢查需求：$SHOULD_RUN"

  jest-coverage:
    name: Jest Full Coverage
    needs: coverage-classifier
    if: needs.coverage-classifier.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'manual-heavy-gate' || 'coverage-auto' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 簽出 repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 設定 Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20.x
          cache: npm

      - name: 升級 npm
        run: npm install -g npm@11.8.0 --ignore-scripts

      - name: 安裝依賴
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --ignore-scripts

      - name: 準備測試建置環境
        run: |
          if [ ! -f "scripts/config/env/build.js" ] && [ -f "scripts/config/env/build.example.js" ]; then
            cp scripts/config/env/build.example.js scripts/config/env/build.js
            echo "已從範本建立 scripts/config/env/build.js 供測試使用"
          fi

      - name: 快取 Jest V8 覆蓋率 runtime 輸出
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .tmp/jest-cache-native-esm
          key: ${{ runner.os }}-jest-v8-${{ hashFiles('jest.config.js', 'jest.config.*.js', 'jest.native-esm.config.cjs', 'package-lock.json') }}
          restore-keys: ${{ runner.os }}-jest-

      - name: 執行 V8 覆蓋率閘門
        run: npm run test:ci

      - name: 驗證覆蓋率檔案
        id: validate-coverage
        run: |
          EXPECTED_CODECOV_LCOV_FILE="coverage/native-esm/lcov.info"
          LCOV_FILE="coverage/native-esm/lcov.info"
          if [ "$LCOV_FILE" != "$EXPECTED_CODECOV_LCOV_FILE" ]; then
            echo "Codecov 上傳在本次演練中必須使用 native ESM LCOV。" >&2
            exit 1
          fi
          if [ ! -f "$LCOV_FILE" ]; then
            echo "在 $LCOV_FILE 找不到覆蓋率檔案。" >&2
            exit 1
          fi
          if grep -q "^SF:" "$LCOV_FILE" && grep -q "end_of_record" "$LCOV_FILE"; then
            echo "file=$LCOV_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "$LCOV_FILE 的 LCOV 格式無效" >&2
            exit 1
          fi

      - name: 上傳覆蓋率到 Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: ${{ steps.validate-coverage.outputs.file }}
          flags: unit
          disable_search: true
          fail_ci_if_error: false
          use_oidc: true
