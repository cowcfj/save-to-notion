name: Coverage Gate
run-name: Coverage Gate @ ${{ github.ref_name }} (${{ github.event_name }})

on:
  pull_request:
    branches: [main, develop]
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  coverage-classifier:
    name: Coverage Gate Classifier
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.decision.outputs.should-run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Detect coverage-relevant changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        with:
          filters: |
            coverage-relevant:
              - 'scripts/**'
              - 'pages/**'
              - 'tests/**'
              - 'babel.config.js'
              - 'jest.config.js'
              - 'jest.config.*.js'
              - 'package.json'
              - 'package-lock.json'
              - 'sonar-project.properties'
              - 'codecov.yml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/coverage-gate.yml'

      - name: Decide whether full coverage is required
        id: decision
        run: |
          SHOULD_RUN=false

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            SHOULD_RUN=true
          elif [ "${{ startsWith(github.head_ref, 'release-please--') }}" = "true" ]; then
            SHOULD_RUN=false
          elif [ "${{ steps.changes.outputs.coverage-relevant }}" = "true" ]; then
            SHOULD_RUN=true
          fi

          echo "should-run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "Coverage required: $SHOULD_RUN"

  jest-coverage:
    name: Jest Full Coverage
    needs: coverage-classifier
    if: needs.coverage-classifier.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'manual-heavy-gate' || 'coverage-auto' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20.x
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@11.8.0 --ignore-scripts

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --ignore-scripts

      - name: Prepare build env for tests
        run: |
          if [ ! -f "scripts/config/env/build.js" ] && [ -f "scripts/config/env/build.example.js" ]; then
            cp scripts/config/env/build.example.js scripts/config/env/build.js
            echo "已從範本建立 scripts/config/env/build.js 供測試使用"
          fi

      - name: Cache jest transform output
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .jest-cache
          key: ${{ runner.os }}-jest-${{ hashFiles('jest.config.js', 'jest.config.*.js', 'package-lock.json') }}
          restore-keys: ${{ runner.os }}-jest-

      - name: Jest unit and integration tests with coverage
        run: npm run test:ci

      - name: Native ESM 覆蓋率正確性診斷
        run: npm run test:coverage:native-esm:assert

      - name: Native ESM 官方範圍一致性報告
        if: always()
        run: npm run test:coverage:native-esm:scope-parity

      - name: 發佈 native ESM 診斷摘要
        if: always()
        run: |
          if [ -f coverage/native-esm/line-hit-summary.md ]; then
            cat coverage/native-esm/line-hit-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "未產生 native ESM 診斷摘要。" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f coverage/native-esm/scope-parity-summary.md ]; then
            cat coverage/native-esm/scope-parity-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "未產生 native ESM 範圍一致性摘要。" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 上傳 native ESM 診斷 artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: native-esm-diagnostic-${{ github.sha }}
          path: |
            coverage/native-esm/line-hit-summary.json
            coverage/native-esm/line-hit-summary.md
            coverage/native-esm/scope-parity-summary.json
            coverage/native-esm/scope-parity-summary.md
            coverage/native-esm/lcov.info
          retention-days: 14
          if-no-files-found: warn

      - name: 驗證覆蓋率檔案
        id: validate-coverage
        run: |
          EXPECTED_CODECOV_LCOV_FILE="coverage/jest/lcov.info"
          LCOV_FILE="coverage/jest/lcov.info"
          if [ "$LCOV_FILE" != "$EXPECTED_CODECOV_LCOV_FILE" ]; then
            echo "Codecov 上傳必須維持使用既有 Jest LCOV。" >&2
            exit 1
          fi
          if [ ! -f "$LCOV_FILE" ]; then
            echo "在 $LCOV_FILE 找不到覆蓋率檔案。" >&2
            exit 1
          fi
          if grep -q "^SF:" "$LCOV_FILE" && grep -q "end_of_record" "$LCOV_FILE"; then
            echo "file=$LCOV_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "$LCOV_FILE 的 LCOV 格式無效" >&2
            exit 1
          fi

      - name: Upload jest coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jest-coverage-${{ github.sha }}
          path: coverage/jest/lcov.info
          retention-days: 7
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: ${{ steps.validate-coverage.outputs.file }}
          flags: unit
          fail_ci_if_error: false
          use_oidc: true

      - name: Validate native ESM coverage
        id: validate-native-esm-coverage
        run: |
          NATIVE_ESM_LCOV_FILE="coverage/native-esm/lcov.info"
          if [ ! -f "$NATIVE_ESM_LCOV_FILE" ]; then
            echo "在 $NATIVE_ESM_LCOV_FILE 找不到 native ESM 覆蓋率檔案。" >&2
            exit 1
          fi
          if grep -q "^SF:" "$NATIVE_ESM_LCOV_FILE" && grep -q "^end_of_record$" "$NATIVE_ESM_LCOV_FILE"; then
            echo "Native ESM LCOV file validated: $NATIVE_ESM_LCOV_FILE"
          else
            echo "$NATIVE_ESM_LCOV_FILE 的 LCOV 格式無效" >&2
            exit 1
          fi

      - name: Dry-run native ESM coverage upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: coverage/native-esm/lcov.info
          flags: native-esm-parity
          name: native-esm-parity-dry-run
          dry_run: true
          disable_search: true
          fail_ci_if_error: false
          use_oidc: true
