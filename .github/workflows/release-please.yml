name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to release (e.g., v2.14.4)'
        required: true



jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    # Only run release-please logic on automatic push, not manual dispatch
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}

  release-assets:
    permissions:
      contents: write
    needs: release-please
    # Run if release was just created OR if manually triggered
    if: ${{ needs.release-please.outputs.release_created || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Upgrade npm
        run: npm install -g npm@11.8.0 --ignore-scripts

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate production env.js
        env:
          PROD_SERVER_URL: ${{ secrets.PROD_SERVER_URL }}
          PROD_CLIENT_ID: ${{ secrets.PROD_CLIENT_ID }}
          EXTENSION_API_KEY: ${{ secrets.EXTENSION_API_KEY }}
        run: |
          if [ -z "$PROD_SERVER_URL" ] || [ -z "$PROD_CLIENT_ID" ] || [ -z "$EXTENSION_API_KEY" ]; then
            echo "::error::Missing required secrets (PROD_SERVER_URL, PROD_CLIENT_ID, EXTENSION_API_KEY)"
            exit 1
          fi
          cat <<'SCRIPT' > /tmp/gen-env.js
          const fs = require('node:fs');
          const vm = require('node:vm');

          function normalizeModuleSource(source) {
            return source
              .split('\n')
              .map(line => {
                const trimmedLine = line.trimStart();
                if (!trimmedLine.startsWith('export ')) {
                  return line;
                }

                const leadingWhitespaceLength = line.length - trimmedLine.length;
                return `${line.slice(0, leadingWhitespaceLength)}${trimmedLine.slice('export '.length)}`;
              })
              .join('\n');
          }

          function parseBuildEnvFromSource(source) {
            const script = new vm.Script(
              `${normalizeModuleSource(source)}\nmodule.exports = { BUILD_ENV };`,
              { filename: 'scripts/config/env.js' }
            );
            const context = {
              module: { exports: {} },
              exports: {},
              console,
              globalThis: {},
            };
            script.runInNewContext(context);
            return context.module.exports.BUILD_ENV;
          }

          function validateGeneratedEnvSource(source) {
            let buildEnv;
            try {
              buildEnv = parseBuildEnvFromSource(source);
            } catch (error) {
              throw new Error(`Generated env.js syntax validation failed: ${error.message}`);
            }

            if (!buildEnv || typeof buildEnv !== 'object') {
              throw new Error('Generated env.js validation failed: BUILD_ENV export is missing');
            }
            if (buildEnv.ENABLE_OAUTH !== true) {
              throw new Error('Generated env.js validation failed: ENABLE_OAUTH was not enabled');
            }

            for (const key of ['OAUTH_SERVER_URL', 'OAUTH_CLIENT_ID', 'EXTENSION_API_KEY']) {
              if (typeof buildEnv[key] !== 'string' || buildEnv[key].trim().length === 0) {
                throw new Error(`Generated env.js validation failed: ${key} is missing or empty`);
              }
            }

            if (!Object.isFrozen(buildEnv)) {
              throw new Error('Generated env.js validation failed: BUILD_ENV must be frozen');
            }
          }

          const src = fs.readFileSync('scripts/config/env.example.js', 'utf8');
          const out = src
            .replaceAll('ENABLE_OAUTH: false', 'ENABLE_OAUTH: true')
            .replaceAll("OAUTH_SERVER_URL: ''", `OAUTH_SERVER_URL: ${JSON.stringify(process.env.PROD_SERVER_URL)}`)
            .replaceAll("OAUTH_CLIENT_ID: ''", `OAUTH_CLIENT_ID: ${JSON.stringify(process.env.PROD_CLIENT_ID)}`)
            .replaceAll("EXTENSION_API_KEY: ''", `EXTENSION_API_KEY: ${JSON.stringify(process.env.EXTENSION_API_KEY)}`);

          validateGeneratedEnvSource(out);
          fs.writeFileSync('scripts/config/env.js', out);
          validateGeneratedEnvSource(fs.readFileSync('scripts/config/env.js', 'utf8'));
          process.stdout.write('✓ env.js generated with production config');
          SCRIPT
          node /tmp/gen-env.js

      - name: Build production bundle
        run: |
          echo "Building production bundle..."
          npm run build:prod

      - name: Package Extension
        id: package
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
        run: |
          chmod +x tools/package-extension.sh
          ./tools/package-extension.sh "$TAG_NAME"

      - name: Upload Release Artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
        run: |
          ZIP_FILE=$(ls releases/*.zip | head -n 1)
          gh release upload "$TAG_NAME" "$ZIP_FILE" --clobber
