name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Build
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Detect source changes
        id: changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            test-changed:
              - 'scripts/**'
              - 'pages/**'
              - 'tests/**'
              - 'jest.config.js'
              - 'jest.config.*.js'
              - 'jest.native-default.config.js'
              - 'jest.native-esm.config.js'
              - 'package.json'
              - 'package-lock.json'
              - 'sonar-project.properties'
              - 'codecov.yml'
              - '.github/workflows/ci.yml'
            bundle-changed:
              - 'scripts/**'
              - 'pages/**'
              - 'styles/**'
              - 'rollup/**'
              - 'tools/package-extension.sh'
              - 'tools/check-message-boundaries.mjs'
              - 'tools/check-size-gates.mjs'
              - 'icons/**'
              - 'auth.html'
              - 'manifest.json'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            ci-changed:
              - '.github/workflows/ci.yml'
              - 'jest.config.js'
              - 'jest.config.*.js'
              - 'jest.native-default.config.js'
              - 'jest.native-esm.config.js'
              - 'sonar-project.properties'
              - 'codecov.yml'

      - name: Report skipped heavy CI
        if: steps.changes.outputs.test-changed != 'true' && steps.changes.outputs.bundle-changed != 'true' && steps.changes.outputs.ci-changed != 'true'
        run: echo "::notice::Skipped Node install, tests, lint, and production build because no extension source/test/CI files changed."

      - name: Setup Node.js ${{ matrix.node-version }}
        if: steps.changes.outputs.test-changed == 'true' || steps.changes.outputs.bundle-changed == 'true' || steps.changes.outputs.ci-changed == 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Upgrade npm
        if: steps.changes.outputs.test-changed == 'true' || steps.changes.outputs.bundle-changed == 'true' || steps.changes.outputs.ci-changed == 'true'
        run: npm install -g npm@11.8.0 --ignore-scripts

      - name: Install dependencies
        if: steps.changes.outputs.test-changed == 'true' || steps.changes.outputs.bundle-changed == 'true' || steps.changes.outputs.ci-changed == 'true'
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --ignore-scripts

      - name: Enforce minimatch security floor (ReDoS guard)
        if: steps.changes.outputs.test-changed == 'true' || steps.changes.outputs.bundle-changed == 'true' || steps.changes.outputs.ci-changed == 'true'
        run: |
          node <<'NODE'
          const fs = require('fs');

          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const packages = lock.packages || {};

          const parseVersion = version =>
            String(version)
              .split('.')
              .slice(0, 3)
              .map(part => Number.parseInt(part, 10) || 0);

          const compareVersion = (a, b) => {
            const pa = parseVersion(a);
            const pb = parseVersion(b);
            for (let index = 0; index < 3; index += 1) {
              if (pa[index] > pb[index]) return 1;
              if (pa[index] < pb[index]) return -1;
            }
            return 0;
          };

          const isVulnerable = version => {
            if (compareVersion(version, '3.1.3') < 0) return true;
            if (compareVersion(version, '9.0.0') >= 0 && compareVersion(version, '9.0.7') < 0) return true;
            if (compareVersion(version, '10.0.0') >= 0 && compareVersion(version, '10.2.3') < 0) return true;
            return false;
          };

          const minimatchEntries = Object.entries(packages)
            .filter(([packagePath, meta]) => packagePath.includes('node_modules/minimatch') && meta?.version)
            .map(([packagePath, meta]) => ({ packagePath, version: meta.version }));

          const vulnerable = minimatchEntries.filter(entry => isVulnerable(entry.version));

          if (minimatchEntries.length === 0) {
            console.warn('⚠️ 未在 package-lock.json 中找到 minimatch，略過版本檢查。');
            process.exit(0);
          }

          const uniqueVersions = [...new Set(minimatchEntries.map(entry => entry.version))].sort((a, b) =>
            compareVersion(a, b)
          );
          console.log(`✅ minimatch versions in lockfile: ${uniqueVersions.join(', ')}`);

          if (vulnerable.length > 0) {
            console.error('❌ 發現 vulnerable minimatch 版本：');
            for (const entry of vulnerable) {
              console.error(`- ${entry.packagePath}: ${entry.version}`);
            }
            process.exit(1);
          }

          console.log('✅ minimatch 版本均符合安全下限。');
          NODE

      - name: Node.js 24.x compatibility check
        if: steps.changes.outputs.test-changed == 'true' || steps.changes.outputs.bundle-changed == 'true' || steps.changes.outputs.ci-changed == 'true'
        run: |
          echo "Node.js version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "Jest version: $(npm list jest | grep jest)"

      - name: Lint (non-blocking)
        if: steps.changes.outputs.test-changed == 'true' || steps.changes.outputs.bundle-changed == 'true' || steps.changes.outputs.ci-changed == 'true'
        run: npm run lint
        continue-on-error: true

      - name: Prepare build env for tests
        if: steps.changes.outputs.test-changed == 'true' || steps.changes.outputs.ci-changed == 'true'
        run: |
          if [ ! -f "scripts/config/env/build.js" ] && [ -f "scripts/config/env/build.example.js" ]; then
            cp scripts/config/env/build.example.js scripts/config/env/build.js
            echo "Created scripts/config/env/build.js from template for tests"
          fi

      - name: Cache jest transform output
        if: steps.changes.outputs.test-changed == 'true' || steps.changes.outputs.ci-changed == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .jest-cache
          key: ${{ runner.os }}-jest-${{ hashFiles('jest.config.js', 'jest.config.*.js', 'jest.native-default.config.js', 'jest.native-esm.config.js', 'package-lock.json') }}
          restore-keys: ${{ runner.os }}-jest-

      - name: Detect changed source files for related tests
        id: changed-files
        if: (steps.changes.outputs.test-changed == 'true' || steps.changes.outputs.ci-changed == 'true') && github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" HEAD -- scripts pages tests jest.config.js 'jest.config.*.js' jest.native-default.config.js jest.native-esm.config.js package.json package-lock.json)
          if [ -n "$CHANGED_FILES" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "變更的檔案:"
            echo "$CHANGED_FILES"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Jest related tests
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"

          # 取得所有變更檔案
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" HEAD -- scripts pages tests jest.config.js 'jest.config.*.js' jest.native-default.config.js jest.native-esm.config.js package.json package-lock.json)

          # 配置檔案無法用 --findRelatedTests；測試檔要直接 run-by-path。
          CANDIDATE_FILES=$(echo "$CHANGED_FILES" | grep -v -E '^(package\.json|package-lock\.json|jest\.config(\..*)?\.js|jest\.(native-default|native-esm)\.config\.js)$' || true)
          INCUMBENT_TEST_FILES=$(CANDIDATE_FILES="$CANDIDATE_FILES" node - <<'NODE'
          (async () => {
            const { default: config } = await import('./jest.config.js');
            const candidates = (process.env.CANDIDATE_FILES || '').split('\n').filter(Boolean);
            const rootPrefix = '<rootDir>/';
            const patterns = (config.projects || []).flatMap(project => project.testMatch || []);

            function globToRegex(glob) {
              let normalized = glob.startsWith(rootPrefix) ? glob.slice(rootPrefix.length) : glob;
              normalized = normalized.replace(/[.+^${}()|[\]\\]/g, '\\$&');
              normalized = normalized.replace(/\*\*\//g, '(?:.+/)?');
              normalized = normalized.replace(/\*\*/g, '.*');
              normalized = normalized.replace(/\*/g, '[^/]*');
              return new RegExp(`^${normalized}$`);
            }

            const regexes = patterns.map(globToRegex);
            for (const candidate of candidates) {
              if (regexes.some(regex => regex.test(candidate))) {
                console.log(candidate);
              }
            }
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
          )
          NATIVE_DEFAULT_TEST_FILES=$(CANDIDATE_FILES="$CANDIDATE_FILES" node - <<'NODE'
          (async () => {
            const configModule = await import('./jest.native-default.config.js');
            const config = configModule.default ?? configModule;
            const candidates = (process.env.CANDIDATE_FILES || '').split('\n').filter(Boolean);
            const rootPrefix = '<rootDir>/';

            function globToRegex(glob) {
              let normalized = glob.startsWith(rootPrefix) ? glob.slice(rootPrefix.length) : glob;
              normalized = normalized.replace(/[.+^${}()|[\]\\]/g, '\\$&');
              normalized = normalized.replace(/\*\*\//g, '(?:.+/)?');
              normalized = normalized.replace(/\*\*/g, '.*');
              normalized = normalized.replace(/\*/g, '[^/]*');
              return new RegExp(`^${normalized}$`);
            }

            const nativeDefaultRegexes = (config.testMatch || []).map(globToRegex);
            for (const candidate of candidates) {
              if (nativeDefaultRegexes.some(regex => regex.test(candidate))) {
                console.log(candidate);
              }
            }
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
          )
          NATIVE_TEST_FILES=$(printf '%s\n' "$NATIVE_DEFAULT_TEST_FILES" | sed '/^$/d' | sort -u || true)
          SOURCE_FILES=$(echo "$CANDIDATE_FILES" | grep -E '^(scripts|pages)/.*\.(cjs|js|mjs)$' || true)

          if [ -z "$SOURCE_FILES" ] && [ -z "$INCUMBENT_TEST_FILES" ] && [ -z "$NATIVE_TEST_FILES" ]; then
            echo "::notice::只變更設定檔，改執行 smoke test 而不是 related tests"
            npm test -- --listTests
          fi

          if [ -n "$INCUMBENT_TEST_FILES" ]; then
            echo "正在執行變更的 incumbent Jest 測試檔:"
            echo "$INCUMBENT_TEST_FILES"
            echo "$INCUMBENT_TEST_FILES" | xargs npx jest --config jest.config.js --ci --runTestsByPath --maxWorkers=2
          fi

          if [ -n "$NATIVE_TEST_FILES" ]; then
            echo "正在執行變更的 native-default Jest 測試檔:"
            echo "$NATIVE_TEST_FILES"
            echo "$NATIVE_TEST_FILES" | NODE_OPTIONS=--experimental-vm-modules xargs npx jest --config jest.native-default.config.js --ci --runTestsByPath --maxWorkers=2
          fi

          if [ -n "$SOURCE_FILES" ]; then
            echo "正在為變更的來源檔案執行 related tests:"
            echo "$SOURCE_FILES"
            echo "$SOURCE_FILES" | xargs npx jest --config jest.config.js --ci --findRelatedTests --passWithNoTests --maxWorkers=2
          fi

      - name: Jest config-change smoke suite
        if: steps.changes.outputs.ci-changed == 'true' || (github.event_name != 'pull_request' && (steps.changes.outputs.test-changed == 'true' || steps.changes.outputs.ci-changed == 'true'))
        run: npm test -- --listTests

      # E2E 測試從 CI 移除：Chrome headless 模式不支持 Extension Service Worker
      # （Chromium Issue #41309918）。E2E 可在本地用 npm run test:e2e 跑（headed 模式）。

      - name: Verify Production Build
        if: steps.changes.outputs.bundle-changed == 'true' || steps.changes.outputs.ci-changed == 'true'
        env:
          EXTENSION_API_KEY: ${{ secrets.EXTENSION_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before || '' }}
        run: |
          CURRENT_UNPACKED_DIR=".tmp/ci-extension-current"
          CURRENT_REPORT_FILE=".tmp/size-report-current.json"
          DELTA_REPORT_FILE=".tmp/size-report-delta.json"

          prepare_build_env() {
            # New structure: env/build.example.js -> env/build.js
            if [ ! -f "scripts/config/env/build.js" ] && [ -f "scripts/config/env/build.example.js" ]; then
              cp scripts/config/env/build.example.js scripts/config/env/build.js
            fi
            if [ ! -f "scripts/config/env/build.js" ] && [ ! -f "scripts/config/env/build.example.js" ]; then
              echo "::warning file=.github/workflows/ci.yml::Missing env config files: scripts/config/env/build.js, scripts/config/env/build.example.js" >&2
            fi
          }

          echo "Building production bundle..."
          prepare_build_env
          npm run build:prod
          echo "Checking message bundle boundaries..."
          node tools/check-message-boundaries.mjs --require-all
          bash tools/package-extension.sh "ci-current" --unpacked-dir="$CURRENT_UNPACKED_DIR"
          node tools/check-size-gates.mjs \
            --mode=hard \
            --scope=all \
            --root="$PWD" \
            --unpacked-dir="$CURRENT_UNPACKED_DIR" \
            --report-file="$CURRENT_REPORT_FILE"

          # Delta Size Gate 移出 PR 熱路徑，改在 main/develop push 時或具備 valid BEFORE_SHA 時進行
          if [ "$EVENT_NAME" = "push" ] && [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            echo "Performing post-merge delta size gate check against prior commit: $BEFORE_SHA"
            TMP_BASE=$(mktemp -d)
            git fetch --no-tags --depth=1 origin "$BEFORE_SHA"
            git archive "$BEFORE_SHA" | tar -x -C "$TMP_BASE"

            (
              cd "$TMP_BASE"
              export PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
              export EXTENSION_API_KEY="$EXTENSION_API_KEY"
              prepare_build_env
              npm ci --ignore-scripts --prefer-offline
              npm run build:prod >/tmp/base-bundle-build.log
              bash tools/package-extension.sh "ci-base" --unpacked-dir=".tmp/ci-extension-base" >/tmp/base-package-build.log
            )

            node tools/check-size-gates.mjs \
              --mode=delta \
              --scope=all \
              --root="$PWD" \
              --base-root="$TMP_BASE" \
              --unpacked-dir="$CURRENT_UNPACKED_DIR" \
              --base-unpacked-dir="$TMP_BASE/.tmp/ci-extension-base" \
              --report-file="$DELTA_REPORT_FILE"
          else
            echo "::notice::Skipping relative growth check for non-push events, unavailable before SHA, or initial/force pushes."
          fi

      - name: Upload Size Reports
        if: always() && (steps.changes.outputs.bundle-changed == 'true' || steps.changes.outputs.ci-changed == 'true')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: size-reports
          path: |
            .tmp/size-report-current.json
            .tmp/size-report-delta.json
          if-no-files-found: ignore

      - name: Upload Test Artifacts (Action Report)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-report
          path: junit.xml
          if-no-files-found: ignore
